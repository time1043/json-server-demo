<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Server Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(10px);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .toast-enter {
        animation: fadeIn 0.3s ease-out;
      }
      .toast-exit {
        animation: fadeOut 0.3s ease-out forwards;
      }
      .modal-enter {
        animation: slideIn 0.2s ease-out;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Nav Bar -->
    <nav class="bg-white shadow sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
        <h1 class="text-lg md:text-xl font-bold text-gray-800 shrink-0">
          <span class="hidden sm:inline">JSON Server Demo</span>
          <span class="sm:hidden">JSD</span>
        </h1>
        <div class="flex-1">
          <input
            id="search-input"
            type="text"
            placeholder="Search posts..."
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>
        <button
          id="btn-new-post"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 active:scale-95 transition-all shrink-0"
        >
          + New Post
        </button>
      </div>
    </nav>

    <!-- Toolbar -->
    <div
      class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3"
    >
      <div class="flex items-center gap-3">
        <label class="text-sm text-gray-600">Sort by:</label>
        <select
          id="sort-field"
          class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
        >
          <option value="id">ID</option>
          <option value="title">Title</option>
          <option value="author">Author</option>
          <option value="views">Views</option>
        </select>
        <button
          id="sort-dir"
          class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition"
          title="Toggle sort direction"
        >
          ASC
        </button>
      </div>
      <span id="post-count" class="text-sm text-gray-500"></span>
    </div>

    <!-- Posts Grid -->
    <main class="max-w-7xl mx-auto px-4 pb-8">
      <div
        id="posts"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
      ></div>
      <div
        id="pagination"
        class="flex items-center justify-center gap-2 mt-8"
      ></div>
      <div id="empty-state" class="hidden text-center py-16 text-gray-500">
        <p class="text-lg">No posts found.</p>
        <button
          id="btn-clear-search"
          class="mt-3 text-blue-600 hover:underline hidden"
        >
          Clear search
        </button>
        <button
          id="btn-create-first"
          class="mt-3 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition hidden"
        >
          Create your first post
        </button>
      </div>
    </main>

    <!-- Modal -->
    <div
      id="modal"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4"
    >
      <div
        id="modal-content"
        class="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[85vh] overflow-y-auto modal-enter"
      ></div>
    </div>

    <!-- Confirm Dialog -->
    <div
      id="confirm-dialog"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-[60] p-4"
    >
      <div
        class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 modal-enter"
      >
        <div class="flex items-center gap-3 mb-4">
          <div class="bg-red-100 rounded-full p-2">
            <svg
              class="w-6 h-6 text-red-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"
              />
            </svg>
          </div>
          <p id="confirm-message" class="text-gray-800 font-medium"></p>
        </div>
        <div class="flex justify-end gap-3">
          <button
            id="confirm-cancel"
            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            id="confirm-ok"
            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 active:scale-95 transition-all"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toasts"
      class="fixed bottom-4 right-4 z-[70] flex flex-col gap-2"
    ></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
